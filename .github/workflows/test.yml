name: Test Build Scripts

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-scripts:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip wget

    - name: Install npm dependencies
      run: npm install

    - name: Make scripts executable
      run: find . -name '*.sh' -not -path './node_modules/*' -not -path './.claude/*' -exec chmod +x {} +

    - name: Test main build script help
      run: ./build-appimage.sh --help

    - name: Validate shell scripts
      run: |
        find . -name '*.sh' -not -path './node_modules/*' -not -path './.claude/*' | while read script; do
          echo "Checking $script..."
          bash -n "$script"
        done

    - name: Smoke test - version detection
      run: |
        source scripts/version/check-official-version.sh
        VERSION=$(get_latest_version)
        if [ -z "$VERSION" ]; then
          echo "::warning::Could not detect Claude version (network issue?)"
        else
          echo "Detected Claude Desktop version: $VERSION"
        fi

    - name: Smoke test - install script dry check
      run: |
        # Verify install.sh is syntactically valid
        bash -n install.sh
        # Check it detects non-aarch64 correctly
        if [ "$(uname -m)" != "aarch64" ]; then
          install_output=$(bash install.sh 2>&1 || true)
          echo "$install_output" | grep -q "aarch64" && echo "Arch check works"
        fi
