name: Test Build Scripts

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-scripts:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip wget

    - name: Install npm dependencies
      run: npm install

    - name: Make scripts executable
      run: find . -name '*.sh' -not -path './node_modules/*' -not -path './.claude/*' -exec chmod +x {} +

    - name: Test main build script help
      run: ./build-appimage.sh --help

    - name: Validate shell scripts
      run: |
        find . -name '*.sh' -not -path './node_modules/*' -not -path './.claude/*' | while read script; do
          echo "Checking $script..."
          bash -n "$script"
        done
